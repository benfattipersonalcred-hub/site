<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Benfatti</title>
    <link rel="stylesheet" href="css/styleLogin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="img/logo.png" alt="Benfatti Personal Cred">
        </div>

        <div class="login-header">
            <h2>Acessar Painel</h2>
            <p>Insira suas credenciais para continuar</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <div class="login-footer">
            <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </div>

    <!-- MODAL POP-UP: Recuperação de Senha -->
    <div id="modalRecuperar" class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Recuperar Senha</h3>
                <button id="btnFecharModal" class="btn-close">&times;</button>
            </div>
            <p class="modal-instruction">Insira o e-mail cadastrado abaixo. Enviaremos um link de redefinição seguro direto para a sua caixa de entrada.</p>
            <form id="recuperarForm">
                <div class="input-group">
                    <label for="emailRecuperar">E-mail Cadastrado</label>
                    <input type="email" id="emailRecuperar" placeholder="seu@email.com" required>
                </div>
                <button type="submit" id="btnEnviarRecuperar" class="btn-login">Enviar Solicitação</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
