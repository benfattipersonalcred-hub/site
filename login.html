<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Benfatti</title>
    <link rel="stylesheet" href="css/styleLogin.css">
</head>
<body>
    <div class="login-container">
        <!-- Logotipo Oficial com link clicável redirecionando para a Home -->
        <div class="login-logo">
            <a href="index.html">
                <img src="img/logo.png" alt="Benfatti Personal Cred">
            </a>
        </div>

        <div class="login-header">
            <h2>Acessar Painel</h2>
            <p>Insira suas credenciais para continuar</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            
            <!-- ALTERADO: Uso de SVG nativo para forçar a renderização do olho sem depender de CDNs -->
            <div class="input-group">
                <label for="senha">Senha</label>
                <div style="display: flex; align-items: center; background-color: var(--cor-fundo-tela); border: 1px solid var(--cor-borda); border-radius: 8px; padding-right: 1.2rem;">
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required style="border: none; background: transparent; width: 100%; margin: 0; box-shadow: none; padding: 0.85rem 1.2rem; color: var(--cor-texto-claro); font-size: 0.95rem;">
                    <div id="toggleSenhaLogin" style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; z-index: 20;">
                        <svg id="svgOlho" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="#8fa096" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <div class="login-footer">
            <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            
            <!-- Link de retorno limpo e sem emojis -->
            <div style="margin-top: 1.5rem; border-top: 1px solid var(--cor-borda); padding-top: 1.2rem;">
                <a href="index.html" style="color: var(--cor-texto-mutado); text-decoration: none; font-size: 0.85rem; font-weight: 500;" onmouseover="this.style.color='var(--cor-primaria)'" onmouseout="this.style.color='var(--cor-texto-mutado)'">
                    Voltar para a Página Inicial
                </a>
            </div>
        </div>
    </div>

    <!-- MODAL POP-UP: Recuperação de Senha -->
    <div id="modalRecuperar" class="modal-container">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Recuperar Senha</h3>
                <button id="btnFecharModal" class="btn-close">&times;</button>
            </div>
            <p class="modal-instruction">Insira o e-mail cadastrado abaixo. Enviaremos um link de redefinição seguro direto para a sua caixa de entrada.</p>
            <form id="recuperarForm">
                <div class="input-group">
                    <label for="emailRecuperar">E-mail Cadastrado</label>
                    <input type="email" id="emailRecuperar" placeholder="seu@email.com" required>
                </div>
                <button type="submit" id="btnEnviarRecuperar" class="btn-login">Enviar Solicitação</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
    
    <!-- LÓGICA DE INTERAÇÃO DO OLHO SVG NO LOGIN -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const containerOlho = document.getElementById('toggleSenhaLogin');
            const campoSenha = document.getElementById('senha');
            const svgOlho = document.getElementById('svgOlho');

            // Desenhos dos olhos em SVG (Aberto e Fechado)
            const olhoAberto = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            const olhoFechado = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

            if (containerOlho && campoSenha && svgOlho) {
                containerOlho.addEventListener('click', () => {
                    if (campoSenha.getAttribute('type') === 'password') {
                        campoSenha.setAttribute('type', 'text');
                        svgOlho.innerHTML = olhoFechado; // Muda o desenho para olho cortado
                    } else {
                        campoSenha.setAttribute('type', 'password');
                        svgOlho.innerHTML = olhoAberto; // Retorna para olho aberto
                    }
                });
            }
        });
    </script>
</body>
</html>
