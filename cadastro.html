<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Reutiliza o mesmo estilo base do login para manter o padrão visual -->
    <link rel="stylesheet" href="css/styleLogin.css">
    <link rel="stylesheet" href="https://cloudflare.com"
        integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>CADASTRO | BENFATTI PERSONAL CRED</title>
    <style>
        /* Ajuste fino específico para caber mais campos sem quebrar o layout */
        .login-container {
            max-width: 500px;
            padding: 30px 25px;
        }

        .row-inputs {
            display: flex;
            gap: 15px;
        }

        .row-inputs .input-group {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <a href="index.html">
                <img src="img/logo.png" alt="BENFATTI PERSONAL CRED" class="logo">
            </a>
            <p>Preencha os campos abaixo para criar sua conta.</p>
        </div>

        <form id="form-cadastro" class="login-form">
            <!-- Nome -->
            <div class="input-group">
                <i class="fa fa-user input-icon"></i>
                <input type="text" id="cad-nome" placeholder="Nome Completo" required>
            </div>

            <!-- Email -->
            <div class="input-group">
                <i class="fa fa-envelope input-icon"></i>
                <input type="email" id="cad-email" placeholder="Seu E-mail" required>
            </div>

            <!-- WhatsApp -->
            <div class="input-group">
                <i class="fa fa-whatsapp input-icon"></i>
                <input type="tel" id="cad-whatsapp" placeholder="WhatsApp / Telefone" required>
            </div>

            <!-- Endereço e Número na mesma linha -->
            <div class="row-inputs">
                <div class="input-group" style="flex: 3;">
                    <i class="fa fa-map-marker input-icon"></i>
                    <input type="text" id="cad-endereco" placeholder="Endereço (Rua/Av)" required>
                </div>
                <div class="input-group">
                    <input type="text" id="cad-numero" placeholder="Nº" required style="padding-left: 15px;">
                </div>
            </div>

            <!-- Bairro -->
            <div class="input-group">
                <i class="fa fa-home input-icon"></i>
                <input type="text" id="cad-bairro" placeholder="Bairro" required>
            </div>

            <!-- Cidade e Estado na mesma linha -->
            <div class="row-inputs">
                <div class="input-group" style="flex: 3;">
                    <i class="fa fa-building input-icon"></i>
                    <input type="text" id="cad-cidade" placeholder="Cidade" required>
                </div>
                <div class="input-group">
                    <input type="text" id="cad-estado" placeholder="UF" maxlength="2" required
                        style="padding-left: 15px; text-transform: uppercase;">
                </div>
            </div>

            <!-- Senha -->
            <div class="input-group password-group">
                <i class="fa fa-lock input-icon"></i>
                <input type="password" id="cad-senha" placeholder="Crie uma Senha" required>
                <button type="button" id="toggle-password" class="toggle-password-btn">
                    <i id="eye-icon" class="fa fa-eye"></i>
                </button>
            </div>

            <!-- MODIFICADO: Adicionado campo de confirmação de senha com botão do olho próprio -->
            <div class="input-group password-group">
                <i class="fa fa-lock input-icon"></i>
                <input type="password" id="cad-confirmar-senha" placeholder="Confirme a sua Senha" required>
                <button type="button" id="toggle-confirmar-password" class="toggle-password-btn">
                    <i id="eye-icon-confirmar" class="fa fa-eye"></i>
                </button>
            </div>

            <!-- Botão de Envio de Cadastro -->
            <button type="submit" class="btn-login" id="btn-cadastrar">Finalizar Cadastro</button>
        </form>

        <div class="login-footer">
            <a href="login.html"><i class="fa fa-arrow-left"></i> Já tenho conta? Fazer Login</a>
        </div>
    </div>

    <script>
        // 1. Mostrar/Ocultar a primeira senha
        const togglePasswordButton = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('cad-senha');
        const eyeIcon = document.getElementById('eye-icon');

        togglePasswordButton.addEventListener('click', function () {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // 2. Mostrar/Ocultar a confirmação da senha
        const toggleConfirmarButton = document.getElementById('toggle-confirmar-password');
        const confirmarInput = document.getElementById('cad-confirmar-senha');
        const eyeIconConfirmar = document.getElementById('eye-icon-confirmar');

        toggleConfirmarButton.addEventListener('click', function () {
            if (confirmarInput.type === 'password') {
                confirmarInput.type = 'text';
                eyeIconConfirmar.classList.remove('fa-eye');
                eyeIconConfirmar.classList.add('fa-eye-slash');
            } else {
                confirmarInput.type = 'password';
                eyeIconConfirmar.classList.remove('fa-eye-slash');
                eyeIconConfirmar.classList.add('fa-eye');
            }
        });

        // 3. Integração com a Planilha e Validação local
        // Insira a URL da API gerada no Apps Script
        const URL_API = "https://script.google.com/macros/s/AKfycbxBRTfCJFtMZpV2ZycevBv4wODsdopCjuIg5F-8cWfrnhCiNrJu5W-CM5_lZF0_VmCA/exec";

        const formCadastro = document.getElementById("form-cadastro");
        const btnCadastrar = document.getElementById("btn-cadastrar");

        formCadastro.addEventListener("submit", function (event) {
            event.preventDefault(); // Impede recarregamento da página

            const senha = document.getElementById("cad-senha").value;
            const confirmarSenha = document.getElementById("cad-confirmar-senha").value;

            // VALIDAÇÃO LOCAL: Verifica se as senhas batem antes de enviar para o servidor
            if (senha !== confirmarSenha) {
                alert("As senhas inseridas não coincidem. Verifique e tente novamente.");
                document.getElementById("cad-confirmar-senha").focus();
                return; // Encerra a função e não dispara o fetch
            }

            btnCadastrar.disabled = true;
            btnCadastrar.innerText = "Salvando Cadastro...";

            const novosDados = {
                action: "create",
                id: "USER-" + Date.now().toString(),
                nome: document.getElementById("cad-nome").value,
                email: document.getElementById("cad-email").value,
                whatsapp: document.getElementById("cad-whatsapp").value,
                endereco: document.getElementById("cad-endereco").value,
                numero: document.getElementById("cad-numero").value,
                bairro: document.getElementById("cad-bairro").value,
                cidade: document.getElementById("cad-cidade").value,
                estado: document.getElementById("cad-estado").value.toUpperCase(),
                senha: senha
            };

            fetch(URL_API, {
                method: "POST",
                mode: "cors",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(novosDados)
            })
                .then(res => res.json())
                .then(resultado => {
                    if (resultado.success) {
                        alert("Cadastro realizado com sucesso! Você já pode fazer login.");
                        window.location.href = "login.html";
                    } else {
                        alert(resultado.error);
                    }
                })
                .catch(erro => {
                    console.error("Erro na requisição:", erro);
                    alert("Erro ao conectar com o banco de dados. Tente novamente.");
                })
                .finally(() => {
                    btnCadastrar.disabled = false;
                    btnCadastrar.innerText = "Finalizar Cadastro";
                });
        });
    </script>

</body>

</html>
