<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Benfatti</title>
    <link rel="stylesheet" href="css/styleLogin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="img/logo.png" alt="Benfatti Personal Cred">
        </div>

        <div class="login-header">
            <h2>Confirmar Código</h2>
            <p>Insira o código enviado por e-mail e escolha sua nova senha</p>
        </div>
        
        <form id="novaSenhaForm">
            <div class="input-group">
                <label for="emailReset">E-mail Cadastrado</label>
                <input type="email" id="emailReset" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="codigoReset">Código de Verificação (6 dígitos)</label>
                <input type="text" id="codigoReset" placeholder="123456" maxlength="6" required style="letter-spacing: 2px; font-weight: bold; text-align: center;">
            </div>

            <div class="input-group">
                <label for="novaSenha">Nova Senha</label>
                <input type="password" id="novaSenha" placeholder="••••••••" required>
            </div>
            
            <div class="input-group">
                <label for="confirmaNovaSenha">Confirmar Nova Senha</label>
                <input type="password" id="confirmaNovaSenha" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="btnSalvarSenha" class="btn-login">Atualizar Senha</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('novaSenhaForm');
            
            // CONFIGURAÇÃO CENTRAL: Cole aqui a URL exata da sua API do Apps Script principal
            const URL_API_GOOGLE = 'https://script.google.com/macros/s/AKfycby-sZ30DhcOCYRVm-1jgXF-Mnv0M0Y6OLsgLAYlfK4xYXSpAnFSqGjEZ_wQjinqxjoCxg/exec';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('emailReset').value.trim();
                const token = document.getElementById('codigoReset').value.trim();
                const novaSenha = document.getElementById('novaSenha').value;
                const confirma = document.getElementById('confirmaNovaSenha').value;

                if (novaSenha !== confirma) {
                    alert('Atenção: As senhas digitadas não coincidem!');
                    return;
                }

                const btn = document.getElementById('btnSalvarSenha');
                btn.textContent = 'Gravando senha...';
                btn.disabled = true;

                try {
                    const payload = {
                        acao: 'atualizarSenha',
                        email: email,
                        token: token,
                        novaSenha: novaSenha
                    };

                    const response = await fetch(URL_API_GOOGLE, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    const resultado = await response.json();

                    if (resultado.status === 'sucesso') {
                        window.alert('Sua senha foi redefinida com sucesso! Você já pode acessar a sua conta com as novas credenciais.');
                        
                        // Redirecionamento invisível compatível com GitHub Pages
                        const linkRetornoLogin = document.createElement('a');
                        linkRetornoLogin.href = 'login.html';
                        document.body.appendChild(linkRetornoLogin);
                        linkRetornoLogin.click();
                        document.body.removeChild(linkRetornoLogin);
                    } else {
                        alert(resultado.mensagem);
                        btn.textContent = 'Atualizar Senha';
                        btn.disabled = false;
                    }
                } catch (error) {
                    console.error(error);
                    alert('Erro de conexão ao tentar atualizar a senha. Verifique a URL da API no código.');
                    btn.textContent = 'Atualizar Senha';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
